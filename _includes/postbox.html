<!-- begin post -->
<div class="col-lg-4 col-md-6 mb-30px card-group">
    <div class="card h-100">
        <div class="maxthumb">
            <a href="{{ site.baseurl }}{{ post.url }}">
                {% if post.image %}
                <img class="img-fluid" src="{% if post.image contains "://" %}{{ post.image }}{% else %}{{ site.baseurl }}/{{ post.image }}{% endif %}" alt="{{ post.title }}">
                {% endif %}
            </a>
        </div>
        <div class="card-body">
            {% assign firstCategory = post.categories | sort | first %}
            {% if firstCategory %}
            <a class="category-pill" href="{{site.baseurl}}/categories#{{ firstCategory | replace: " ","-" }}">{{ firstCategory }}</a>
            {% endif %}
            <h2 class="card-title">
                <a class="text-dark" href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
            </h2>
            <h4 class="card-text">{{ post.excerpt | strip_html | truncatewords:30 }}</h4>
        </div>
        <div class="card-footer bg-white">
            <div class="wrapfooter">
                <span class="post-date">{{ post.date | date_to_string }}</span>
                <span class="post-read-more"><a href="{{ site.baseurl }}{{ post.url }}" title="Read Story">Read more &rarr;</a></span>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
<!-- end post -->
